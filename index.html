<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300&family=Della+Respira&display=swap" rel="stylesheet">
    <style>
        body{
            margin:0;
            --light-o:#e65212;
            --dark-o:#e34500;
            --dark-b:#0d102b;
            --shadow:#d1d1d1;
            --black:#212121;
            background-color: var(--shadow);
            font-family:Barlow;
        }
        header{
            background-color: white;
            position: fixed;
            top:0;
            left:0;
            width:100vw;
            height:100px;
            display:flex;
            justify-content: space-between;
            align-items: space-around;
        }
        header .my-logo{
            display: grid;
            margin-left: 6vw;;
            align-items: center;
            grid-template-columns:30% 70%;
        }

    
        header .my-logo .img-dp {
            background: url("../public/img/84-512.png");
            background-size: contain;
            background-repeat: no-repeat;
            height: 50px;
            width: 50px;
        }
        header .my-logo .name{
            font-size: 25px;
            padding: 10px;
            font-weight: 600;
            min-width: 100%;
        }
        header .nav-right{
            margin-right: 6vw;

            align-items: center;
        }
        header .nav-right nav{
     
            display:flex;
            justify-content:center;
            align-items: center;
            height: 100%;;
        }
        ul{
            list-style-type: none;
        }
        li{
            padding:10px 20px;
            font-size: 18px;
            float:left;
            color:var(--black);
            font-weight: 600;
        }
        li:hover{
            color:var(--dark-o);
            cursor: pointer;
        }
        ul #free-c{
            background-color: var(--light-o);
            color: white;
            border-radius: 6px;;
            padding:10px 25px;
            cursor: pointer;
            position: relative;
        }
        /* ul li::after{
            content:'';
            position: absolute;;
            left:0;
            bottom:0;
            background-color: var(--shadow);
            height:2px;
            width: 100%;
            z-index:1005;
        }
        ul li:hover li::after{
            width: 100%;
            transition: 0.3s ease-in-out;
        } */
    </style>
</head>
<body>
    <header>
        <div class="my-logo">
            <div class="img-dp">

            </div>
            <div class="name">Anushree A.</div>
        </div>
        <div class="nav-right">
            <nav>
                <ul id = "nav-list">
                    <li>Home</li>
                    <li>About</li>
                    <li>Projects</li>
                    <li>Skills</li>
                    <li>Education</li>
                    <li>Contact</li>
                    <li id="free-c">
                        <div class ="text">
                            Free Consultancy
                        </div>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
</body>
</html>
